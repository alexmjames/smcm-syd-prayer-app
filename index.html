<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMCM Sydney Prayer App</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4a0e17">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+Malayalam:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- App Header -->
    <header class="app-header">
        <div class="header-content">
            <h1 id="app-title">Catholic Prayers</h1>
            <div class="header-controls">
                <button id="theme-toggle" aria-label="Toggle Dark Mode">
                    <svg class="icon moon-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1Z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Language Toggle Bar (Sticky) -->
    <div class="language-bar">
        <div class="toggle-container">
            <button class="lang-btn active" data-lang="malayalam">Malayalam</button>
            <button class="lang-btn" data-lang="manglish">Manglish</button>
        </div>
    </div>

    <!-- Main Content Area -->
    <main id="app-main">
        <!-- View container: lists or prayer details will be injected here -->
        <div id="view-container">
            <div class="loading">Loading Prayers...</div>
        </div>
    </main>

    <!-- Back Button / Footer Navigation -->
    <nav class="bottom-nav hidden" id="bottom-nav">
        <button id="back-btn" class="nav-btn">
            <svg class="icon" viewBox="0 0 24 24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Back to List
        </button>
    </nav>

    <script src="data/prayers.js"></script>
    <script src="data/good_friday_1.js"></script>
    <script src="data/good_friday_2.js"></script>
    <script src="data/good_friday_3.js"></script>
    <script src="data/good_friday_4.js"></script>
    <script src="data/good_friday_5.js"></script>
    <script src="data/good_friday_6.js"></script>
    <script src="data/good_friday_7.js"></script>
    <script src="data/good_friday.js"></script>
    <script src="app.js"></script>
    <script>
        // Check that service workers are supported
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.log('SW registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
